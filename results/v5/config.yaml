graph:
  # Correlation threshold to draw an edge
  threshold: 0.3
  # Use absolute value of correlation for edge weights
  abs_correlation: true

model:
  gat:
    node_feature_dim: 25     # 7 numeric × 2 windows (21d + 63d) + 11 sector one-hot
    hidden_dim: 64
    embedding_dim: 32
    num_heads_l1: 4
    num_heads_l2: 4
    num_heads_l3: 4
    dropout: 0.1

  gan:
    noise_dim: 128
    condition_dim: 32        # = gat.embedding_dim (graph-level pooling)
    hidden_dim: 1024
    n_critic_steps: 5
    gp_lambda: 10
    lr: 0.0001
    beta1: 0.0
    beta2: 0.9
    batch_size: 64
    epochs: 300
    use_ema: true
    ema_decay: 0.999
    grad_clip: 1.0
    lr_scheduler: "cosine"
    weight_decay: 0.0

backtest:
  train_months: 12
  rebalance: "monthly"
  transaction_cost: 0.0025   # 0.25% round-trip
  max_weight: 0.10           # 10% cap per stock

seed: 42
